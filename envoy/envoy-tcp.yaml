static_resources:
  listeners:
  - name: tcp_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 15000
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: tcp_stats
          cluster: tcp_backend_cluster

  clusters:
  - name: tcp_backend_cluster
    connect_timeout: 5s
    type: STRICT_DNS               # <--- YOU MUST ADD THIS LINE
    dns_lookup_family: V4_ONLY     # <--- ADD THIS TO PREVENT IPv6 ISSUES IN KUBERNETES
#    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: tcp_backend_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: openapi-http
                port_value: 8081
        - endpoint:
            address:
              socket_address:
                address: openapi-http-2
                port_value: 8081
        - endpoint:
            address:
              socket_address:
                address: openapi-http-3
                port_value: 8081

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
